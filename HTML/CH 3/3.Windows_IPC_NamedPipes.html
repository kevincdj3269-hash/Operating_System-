<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows IPC: Named Pipes Demo</title>
    <style>
        :root {
            --server-color: #8e44ad;
            --client-color: #2980b9;
            --pipe-color: #95a5a6;
            --data-color: #f1c40f;
            --bg-color: #ecf0f1;
            --text-color: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .btn-lang { background: #34495e; color: white; }
        .btn-action { background: #e74c3c; color: white; }
        .btn-reset { background: #bdc3c7; color: #333; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Animation Stage */
        .stage {
            height: 300px;
            position: relative;
            background: #fdfdfd;
            border: 2px dashed #ccc;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
        }

        .process {
            width: 140px;
            height: 100px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
        }
        .server { background: var(--server-color); }
        .client { background: var(--client-color); opacity: 0.3; }

        .pipe-container {
            position: absolute;
            left: 190px;
            right: 190px;
            height: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            z-index: 1;
        }

        .pipe {
            width: 0%; /* Starts invisible */
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                var(--pipe-color),
                var(--pipe-color) 10px,
                #7f8c8d 10px,
                #7f8c8d 20px
            );
            border: 2px solid #7f8c8d;
            border-radius: 5px;
            transition: width 1s ease-in-out;
            opacity: 0;
        }

        .data-packet {
            width: 25px;
            height: 25px;
            background: var(--data-color);
            border-radius: 50%;
            position: absolute;
            left: 100px; /* Inside server */
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            z-index: 10;
            box-shadow: 0 0 10px #e67e22;
            transition: left 1.5s ease-in-out, opacity 0.3s;
        }

        .desc-box {
            background: #eef2f7;
            padding: 20px;
            border-radius: 8px;
            border-left: 6px solid var(--server-color);
            font-size: 1.15rem;
            min-height: 80px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <h2 id="title" style="margin: 0;">Windows IPC: 具名管線 (Named Pipes)</h2>
        <button class="btn-lang" onclick="toggleLang()">EN / 中文</button>
    </div>

    <div style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 15px;">
        <button class="btn-action" onclick="nextStep()" id="btn-next">下一步 (Next)</button>
        <button class="btn-reset" onclick="reset()" id="btn-reset">重置 (Reset)</button>
    </div>

    <div class="stage">
        <div class="process server" id="server">
            <span id="label-server">伺服器行程</span>
            <small>(Server)</small>
        </div>
        
        <div class="pipe-container">
            <div class="pipe" id="pipe"></div>
        </div>

        <div class="data-packet" id="packet"></div>

        <div class="process client" id="client">
            <span id="label-client">客戶端行程</span>
            <small>(Client)</small>
        </div>
    </div>

    <div class="desc-box" id="description">
        點擊「下一步」開始觀察 Windows 具名管線的運作流程。
    </div>
</div>

<script>
    let lang = 'zh';
    let step = 0;

    const dict = {
        zh: {
            title: "Windows IPC: 具名管線 (Named Pipes)",
            next: "下一步 (Next)",
            reset: "重置 (Reset)",
            server: "伺服器行程",
            client: "客戶端行程",
            s0: "點擊「下一步」開始觀察 Windows 具名管線的運作流程。",
            s1: "步驟 1：伺服器建立具名管線 (CreateNamedPipe)，並等待連線。此時管線已實體化。",
            s2: "步驟 2：客戶端透過名稱 (如 \\.\pipe\Name) 連接管線 (ConnectNamedPipe)。客戶端狀態啟動！",
            s3: "步驟 3：伺服器將資料寫入管線中 (WriteFile)。",
            s4: "步驟 4：資料透過管線傳輸，客戶端成功讀取資料 (ReadFile)。通訊完成！"
        },
        en: {
            title: "Windows IPC: Named Pipes",
            next: "Next Step",
            reset: "Reset",
            server: "Server Process",
            client: "Client Process",
            s0: "Click 'Next' to observe the Windows Named Pipe workflow.",
            s1: "Step 1: Server creates a Named Pipe (CreateNamedPipe) and waits. The pipe is now instantiated.",
            s2: "Step 2: Client connects to the pipe using its name (ConnectNamedPipe). Client is active!",
            s3: "Step 3: Server writes data into the pipe (WriteFile).",
            s4: "Step 4: Data travels through the pipe and is read by the Client (ReadFile). Comm complete!"
        }
    };

    function updateText() {
        document.getElementById('title').innerText = dict[lang].title;
        document.getElementById('btn-next').innerText = dict[lang].next;
        document.getElementById('btn-reset').innerText = dict[lang].reset;
        document.getElementById('label-server').innerText = dict[lang].server;
        document.getElementById('label-client').innerText = dict[lang].client;
        
        const desc = document.getElementById('description');
        if (step === 0) desc.innerText = dict[lang].s0;
        else if (step === 1) desc.innerText = dict[lang].s1;
        else if (step === 2) desc.innerText = dict[lang].s2;
        else if (step === 3) desc.innerText = dict[lang].s3;
        else if (step === 4) desc.innerText = dict[lang].s4;
    }

    function toggleLang() {
        lang = lang === 'zh' ? 'en' : 'zh';
        updateText();
    }

    function reset() {
        step = 0;
        document.getElementById('pipe').style.width = '0%';
        document.getElementById('pipe').style.opacity = '0';
        document.getElementById('client').style.opacity = '0.3';
        
        const packet = document.getElementById('packet');
        packet.style.opacity = '0';
        packet.style.left = '100px';
        updateText();
    }

    function nextStep() {
        if (step === 0) {
            step = 1;
            // Server creates pipe
            const pipe = document.getElementById('pipe');
            pipe.style.opacity = '1';
            pipe.style.width = '80%'; 
        } 
        else if (step === 1) {
            step = 2;
            // Client connects
            document.getElementById('pipe').style.width = '100%';
            document.getElementById('client').style.opacity = '1';
        }
        else if (step === 2) {
            step = 3;
            // Server sends data (packet appears)
            const packet = document.getElementById('packet');
            packet.style.opacity = '1';
        }
        else if (step === 3) {
            step = 4;
            // Data moves to client
            const packet = document.getElementById('packet');
            packet.style.left = 'calc(100% - 130px)'; // move to client process area
        }
        else {
            reset();
            return;
        }
        updateText();
    }

    updateText();
</script>

</body>
</html>
