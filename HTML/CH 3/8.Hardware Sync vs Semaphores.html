<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Sync vs Semaphores</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background: var(--bg); color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 900px; text-align: center; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 15px; }
        .btn-lang { background: #34495e; color: white; }
        .btn-mode { background: #8e44ad; color: white; }
        .btn-next { background: var(--success); color: white; }
        .btn-reset { background: #95a5a6; color: white; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .dashboard { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
        .stat-box { background: #ecf0f1; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px; border: 2px solid #bdc3c7; }
        .cpu-active { color: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .stage { height: 350px; position: relative; border: 2px dashed #bdc3c7; border-radius: 12px; background: #fff; overflow: hidden; margin-bottom: 25px; }
        
        .cs-area { width: 220px; height: 150px; border: 4px solid var(--primary); position: absolute; left: 50%; top: 40px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; justify-content: center; background: #e8f4f8; border-radius: 10px; z-index: 1; }
        .lock-badge { background: var(--success); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-top: 10px; }
        .lock-locked { background: var(--danger); }

        .queue-area { width: 200px; height: 100px; border: 2px dashed var(--warning); position: absolute; left: 50px; bottom: 30px; display: flex; align-items: center; justify-content: center; background: #fdfae6; border-radius: 10px; transition: opacity 0.3s; opacity: 0; }
        .queue-label { position: absolute; top: -25px; color: var(--warning); font-weight: bold; }

        .process { width: 80px; height: 80px; border-radius: 12px; position: absolute; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #p0 { background: #2980b9; left: 100px; top: 150px; }
        #p1 { background: #c0392b; right: 100px; top: 150px; }

        .spin-anim { animation: spinBounce 0.5s infinite; }
        @keyframes spinBounce { 0% { transform: translateX(0) rotate(0deg); } 50% { transform: translateX(-20px) rotate(-10deg); } 100% { transform: translateX(0) rotate(0deg); } }

        .sleep-anim { filter: grayscale(100%); opacity: 0.7; }

        .desc-box { background: #f1f2f6; padding: 20px; border-radius: 10px; font-size: 18px; min-height: 80px; border-left: 6px solid var(--primary); text-align: left; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">硬體指令 vs 號誌 (TestAndSet vs Semaphore)</h2>
    
    <div class="controls">
        <button class="btn-lang" onclick="toggleLang()">EN / 中文</button>
        <button class="btn-mode" onclick="toggleMode()" id="btn-mode">當前模式：TestAndSet (硬體自旋鎖)</button>
        <button class="btn-next" onclick="nextStep()" id="btn-next">下一步 (Next)</button>
        <button class="btn-reset" onclick="reset()" id="btn-reset">重置 (Reset)</button>
    </div>

    <div class="dashboard">
        <div class="stat-box" id="cpu-stat">CPU 狀態：<span style="color:var(--success);">空閒 (Idle)</span></div>
        <div class="stat-box" id="lock-stat">Lock 變數 = false</div>
    </div>

    <div class="stage">
        <div class="cs-area">
            <span id="cs-label" style="font-weight: bold; font-size:18px; color:var(--primary);">臨界區 (CS)</span>
            <div class="lock-badge" id="lock-badge">Unlocked</div>
        </div>
        
        <div class="queue-area" id="queue">
            <div class="queue-label" id="queue-label">OS 等待佇列 (Wait Queue)</div>
        </div>

        <div class="process" id="p0">P0</div>
        <div class="process" id="p1">P1</div>
    </div>

    <div class="desc-box" id="desc-text">
        點擊「下一步」開始演繹。P0 準備進入臨界區。
    </div>
</div>

<script>
    let lang = 'zh';
    let mode = 'tas'; // 'tas' or 'sem'
    let step = 0;

    const dict = {
        zh: {
            title: "硬體指令 vs 號誌 (TestAndSet vs Semaphore)",
            modeTAS: "切換模式：目前為 TestAndSet (自旋鎖)",
            modeSEM: "切換模式：目前為 Semaphore (號誌睡眠)",
            next: "下一步 (Next)", reset: "重置 (Reset)", cs: "臨界區 (CS)", queue: "OS 等待佇列 (Wait Queue)",
            cpuIdle: "CPU 狀態：<span style='color:green;'>空閒 (Idle)</span>",
            cpuBusy: "CPU 狀態：<span class='cpu-active'>100% 滿載空轉中 (Busy Waiting)!</span>",
            cpuSleep: "CPU 狀態：<span style='color:green;'>行程睡眠中，CPU釋放 (Free)</span>",
            
            tas_s0: "[TestAndSet 模式] 初始狀態。P0 準備進入臨界區。",
            tas_s1: "步驟 1：P0 執行 TestAndSet，成功將 Lock 設為 True，進入臨界區。",
            tas_s2: "步驟 2：P1 抵達，準備進入臨界區。",
            tas_s3: "步驟 3 (關鍵缺陷)：P1 執行 TestAndSet 失敗。由於是硬體指令，P1 只能在 while 迴圈中瘋狂打轉 (Busy Waiting)，大量消耗 CPU 資源！",
            tas_s4: "步驟 4：P0 離開臨界區，將 Lock 設為 False。",
            tas_s5: "步驟 5：P1 終於成功突破迴圈，進入臨界區。",

            sem_s0: "[Semaphore 模式] 初始狀態。號誌 S = 1。佇列為空。",
            sem_s1: "步驟 1：P0 執行 Wait(S)，S 變為 0，成功進入臨界區。",
            sem_s2: "步驟 2：P1 抵達，準備進入臨界區。",
            sem_s3: "步驟 3 (作業系統介入)：P1 執行 Wait(S) 發現 S<=0。作業系統直接將 P1 放入「等待佇列」並讓其睡眠 (Block)，完全不浪費 CPU！",
            sem_s4: "步驟 4：P0 離開並執行 Signal(S)。作業系統發現佇列有人，主動將 P1 喚醒 (Wakeup)。",
            sem_s5: "步驟 5：P1 被喚醒後，直接進入臨界區執行。"
        },
        en: {
            title: "Hardware Sync vs Semaphores",
            modeTAS: "Mode: TestAndSet (Spinlock)",
            modeSEM: "Mode: Semaphore (Sleep/Wake)",
            next: "Next Step", reset: "Reset", cs: "Critical Section", queue: "OS Wait Queue",
            cpuIdle: "CPU: <span style='color:green;'>Idle</span>",
            cpuBusy: "CPU: <span class='cpu-active'>100% BUSY WAITING (Spinning)!</span>",
            cpuSleep: "CPU: <span style='color:green;'>Process sleeping, CPU Free</span>",

            tas_s0: "[TestAndSet Mode] Initial state. P0 is ready.",
            tas_s1: "Step 1: P0 executes TestAndSet, succeeds, Lock=True, enters CS.",
            tas_s2: "Step 2: P1 arrives.",
            tas_s3: "Step 3 (Critical Flaw): P1's TestAndSet fails. It loops endlessly (Busy Waiting), wasting massive CPU cycles!",
            tas_s4: "Step 4: P0 exits and sets Lock=False.",
            tas_s5: "Step 5: P1 finally breaks the loop and enters CS.",

            sem_s0: "[Semaphore Mode] Initial state. Semaphore S = 1.",
            sem_s1: "Step 1: P0 executes Wait(S), S becomes 0, enters CS.",
            sem_s2: "Step 2: P1 arrives.",
            sem_s3: "Step 3 (OS Intervention): P1 executes Wait(S), sees S<=0. The OS puts P1 to SLEEP in the Wait Queue. Zero CPU waste!",
            sem_s4: "Step 4: P0 exits and executes Signal(S). The OS wakes up P1 from the queue.",
            sem_s5: "Step 5: P1 wakes up and enters the CS."
        }
    };

    function updateUI() {
        document.getElementById('title').innerText = dict[lang].title;
        document.getElementById('btn-next').innerText = dict[lang].next;
        document.getElementById('btn-reset').innerText = dict[lang].reset;
        document.getElementById('cs-label').innerText = dict[lang].cs;
        document.getElementById('queue-label').innerText = dict[lang].queue;
        document.getElementById('btn-mode').innerText = mode === 'tas' ? dict[lang].modeTAS : dict[lang].modeSEM;
        
        let desc = document.getElementById('desc-text');
        desc.innerHTML = dict[lang][mode + '_s' + step];
    }

    function toggleLang() {
        lang = lang === 'zh' ? 'en' : 'zh';
        updateUI();
    }

    function toggleMode() {
        mode = mode === 'tas' ? 'sem' : 'tas';
        document.getElementById('queue').style.opacity = mode === 'sem' ? '1' : '0';
        reset();
    }

    function setLock(isLocked) {
        let badge = document.getElementById('lock-badge');
        let stat = document.getElementById('lock-stat');
        if (isLocked) {
            badge.innerText = "LOCKED";
            badge.className = "lock-badge lock-locked";
            stat.innerText = mode === 'tas' ? "Lock = True" : "Semaphore S = 0";
        } else {
            badge.innerText = "UNLOCKED";
            badge.className = "lock-badge";
            stat.innerText = mode === 'tas' ? "Lock = False" : "Semaphore S = 1";
        }
    }

    function reset() {
        step = 0;
        let p0 = document.getElementById('p0');
        let p1 = document.getElementById('p1');
        
        p0.style.top = "150px"; p0.style.left = "100px"; p0.className = "process";
        p1.style.top = "150px"; p1.style.right = "100px"; p1.className = "process";
        p1.style.left = "auto";
        
        setLock(false);
        document.getElementById('cpu-stat').innerHTML = dict[lang].cpuIdle;
        updateUI();
    }

    function nextStep() {
        let p0 = document.getElementById('p0');
        let p1 = document.getElementById('p1');
        let cpu = document.getElementById('cpu-stat');

        if(step === 0) {
            step = 1;
            p0.style.top = "70px"; p0.style.left = "calc(50% - 40px)";
            setLock(true);
        } else if(step === 1) {
            step = 2;
            p1.style.right = "250px"; // Move closer
        } else if(step === 2) {
            step = 3;
            if (mode === 'tas') {
                p1.style.right = "150px";
                p1.classList.add('spin-anim');
                cpu.innerHTML = dict[lang].cpuBusy;
            } else {
                p1.style.top = "240px"; // move to queue
                p1.style.right = "auto"; p1.style.left = "110px";
                p1.classList.add('sleep-anim');
                cpu.innerHTML = dict[lang].cpuSleep;
            }
        } else if(step === 3) {
            step = 4;
            p0.style.top = "250px"; p0.style.left = "calc(100% - 150px)"; // P0 leaves
            setLock(false);
            if (mode === 'sem') {
                p1.classList.remove('sleep-anim'); // Wake up
            }
        } else if(step === 4) {
            step = 5;
            if (mode === 'tas') {
                p1.classList.remove('spin-anim');
                p1.style.right = "calc(50% - 40px)";
            } else {
                p1.style.top = "70px"; p1.style.left = "calc(50% - 40px)";
            }
            setLock(true);
            cpu.innerHTML = dict[lang].cpuIdle;
        } else {
            reset();
            return;
        }
        updateUI();
    }

    // Init
    document.getElementById('queue').style.opacity = mode === 'sem' ? '1' : '0';
    updateUI();
    setLock(false);
</script>
</body>
</html>
