<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC Visualization - 行程間通訊演繹</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --p-color: #3498db;
            --kernel-color: #e67e22;
            --shared-color: #2ecc71;
            --text-color: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-lang { background: #95a5a6; color: white; }
        .btn-mode { background: var(--p-color); color: white; }
        .btn-next { background: #e74c3c; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .scene {
            height: 400px;
            position: relative;
            border: 2px dashed #ccc;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .process {
            width: 150px;
            height: 80px;
            background: var(--p-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        #processA { top: 20px; }
        #processB { bottom: 20px; }
        
        .mediator {
            width: 200px;
            height: 100px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .shared-mode { background: var(--shared-color); }
        .message-mode { background: var(--kernel-color); }

        .packet {
            width: 30px;
            height: 30px;
            background: #f1c40f;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: 45px;
            transform: translateX(-50%);
            display: none;
            z-index: 10;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .desc-box {
            min-height: 60px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 5px solid var(--p-color);
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">行程間通訊 (IPC) 演繹</h1>
    
    <div class="controls">
        <button class="btn-lang" onclick="toggleLang()">English / 中文</button>
        <button class="btn-mode" id="modeBtn" onclick="toggleMode()">模式: 共用記憶體</button>
        <button class="btn-next" id="nextBtn" onclick="nextStep()">下一步</button>
        <button class="btn-lang" onclick="reset()">重置</button>
    </div>

    <div class="scene">
        <div class="process" id="processA">Process A</div>
        <div class="mediator shared-mode" id="mediator">Shared Memory</div>
        <div class="process" id="processB">Process B</div>
        <div class="packet" id="packet"></div>
    </div>

    <div class="desc-box" id="description">
        點擊「下一步」開始演繹。
    </div>
</div>

<script>
    let lang = 'zh';
    let mode = 'shared'; // shared or message
    let step = 0;

    const content = {
        zh: {
            title: "行程間通訊 (IPC) 演繹",
            modeShared: "模式: 共用記憶體",
            modeMsg: "模式: 訊息傳遞",
            next: "下一步",
            pA: "行程 A",
            pB: "行程 B",
            shared: "共用記憶體區",
            kernel: "OS 核心 (Kernel)",
            start: "點擊「下一步」開始演繹。",
            s1_shared: "步驟 1: 行程 A 將資料寫入共用記憶體區域。",
            s2_shared: "步驟 2: 行程 B 直接從該區域讀取資料。效率最高！",
            s1_msg: "步驟 1: 行程 A 透過系統呼叫將訊息傳給 OS 核心。",
            s2_msg: "步驟 2: 核心驗證後將訊息放入行程 B 的佇列中。安全性高！"
        },
        en: {
            title: "IPC Visualization",
            modeShared: "Mode: Shared Memory",
            modeMsg: "Mode: Message Passing",
            next: "Next Step",
            pA: "Process A",
            pB: "Process B",
            shared: "Shared Memory",
            kernel: "OS Kernel",
            start: "Click 'Next Step' to start.",
            s1_shared: "Step 1: Process A writes data to the shared region.",
            s2_shared: "Step 2: Process B reads data directly from the region. High efficiency!",
            s1_msg: "Step 1: Process A sends message to Kernel via System Call.",
            s2_msg: "Step 2: Kernel delivers message to Process B's queue. High security!"
        }
    };

    function updateUI() {
        document.getElementById('title').innerText = content[lang].title;
        document.getElementById('modeBtn').innerText = mode === 'shared' ? content[lang].modeShared : content[lang].modeMsg;
        document.getElementById('nextBtn').innerText = content[lang].next;
        document.getElementById('processA').innerText = content[lang].pA;
        document.getElementById('processB').innerText = content[lang].pB;
        
        const med = document.getElementById('mediator');
        if(mode === 'shared') {
            med.innerText = content[lang].shared;
            med.className = 'mediator shared-mode';
        } else {
            med.innerText = content[lang].kernel;
            med.className = 'mediator message-mode';
        }
        updateDesc();
    }

    function updateDesc() {
        const desc = document.getElementById('description');
        if (step === 0) desc.innerText = content[lang].start;
        else if (step === 1) desc.innerText = mode === 'shared' ? content[lang].s1_shared : content[lang].s1_msg;
        else if (step === 2) desc.innerText = mode === 'shared' ? content[lang].s2_shared : content[lang].s2_msg;
    }

    function toggleLang() {
        lang = lang === 'zh' ? 'en' : 'zh';
        updateUI();
    }

    function toggleMode() {
        mode = mode === 'shared' ? 'message' : 'shared';
        reset();
    }

    function reset() {
        step = 0;
        const packet = document.getElementById('packet');
        packet.style.display = 'none';
        packet.style.top = '45px';
        updateUI();
    }

    function nextStep() {
        const packet = document.getElementById('packet');
        if (step === 0) {
            step = 1;
            packet.style.display = 'block';
            packet.style.top = '45px';
            // Animation to middle
            packet.animate([
                { top: '45px' },
                { top: '185px' }
            ], { duration: 800, fill: 'forwards' });
        } else if (step === 1) {
            step = 2;
            // Animation to B
            packet.animate([
                { top: '185px' },
                { top: '325px' }
            ], { duration: 800, fill: 'forwards' });
        } else {
            reset();
        }
        updateDesc();
    }

    updateUI();
</script>

</body>
</html>
