<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Algorithm Demo</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f8f9fa;
            --table-border: #bdc3c7;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background: var(--bg); color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 950px; text-align: center; }
        
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 16px; color: white; }
        .btn-lang { background: #34495e; }
        .btn-next { background: var(--success); }
        .btn-reset { background: #95a5a6; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .dashboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; align-items: flex-start; flex-wrap: wrap;}
        
        /* Table Styles */
        table { border-collapse: collapse; font-size: 16px; background: white; flex: 2; min-width: 300px;}
        th, td { border: 2px solid var(--table-border); padding: 12px; text-align: center; }
        th { background-color: var(--primary); color: white; }
        .row-active { background-color: #fcf3cf; border: 3px solid var(--warning) !important; font-weight: bold; transform: scale(1.02); transition: 0.2s;}
        .row-success { background-color: #d5f5e3; color: #1e8449; text-decoration: line-through; transition: 0.3s;}
        .row-fail { background-color: #fadbd8; color: var(--danger); transition: 0.3s;}

        /* Arrays Display Box */
        .side-panel { display: flex; flex-direction: column; gap: 15px; flex: 1; min-width: 250px;}
        .array-box { background: #e8f4f8; border: 3px solid #3498db; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        .array-title { font-weight: bold; font-size: 18px; color: #2980b9; margin-bottom: 10px; }
        .array-vals { font-size: 26px; font-weight: 900; color: #2c3e50; letter-spacing: 2px;}
        
        .finish-box { border-color: #8e44ad; background: #f4ecf7;}
        .finish-title { color: #8e44ad; }
        
        .val-update { color: var(--success) !important; animation: pop 0.5s; display: inline-block;}
        .val-false { color: var(--danger); }
        .val-true { color: var(--success); }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

        .desc-box { background: #f1f2f6; padding: 20px; border-radius: 10px; font-size: 17px; min-height: 120px; border-left: 6px solid var(--success); text-align: left; line-height: 1.6; margin-top: 10px;}
        .highlight { font-weight: bold; color: var(--danger); }
        .highlight-green { font-weight: bold; color: var(--success); }
        .highlight-warn { font-weight: bold; color: #d35400; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">安全演算法 (Safety Algorithm) 沙盤推演</h2>
    
    <div class="controls">
        <button class="btn-lang" onclick="toggleLang()">EN / 中文</button>
        <button class="btn-next" onclick="nextStep()" id="btn-next">下一步 (Next)</button>
        <button class="btn-reset" onclick="reset()" id="btn-reset">重置 (Reset)</button>
    </div>

    <div class="dashboard">
        <table id="bank-table">
            <thead>
                <tr>
                    <th id="th-proc">行程 (Process)</th>
                    <th id="th-alloc">已分配 (Allocation)</th>
                    <th id="th-need">尚需 (Need)</th>
                </tr>
            </thead>
            <tbody>
                <tr id="r-p0"><td>P0</td><td>0, 1, 0</td><td>7, 4, 3</td></tr>
                <tr id="r-p1"><td>P1</td><td>2, 0, 0</td><td>1, 2, 2</td></tr>
                <tr id="r-p2"><td>P2</td><td>3, 0, 2</td><td>6, 0, 0</td></tr>
                <tr id="r-p3"><td>P3</td><td>2, 1, 1</td><td>0, 1, 1</td></tr>
            </tbody>
        </table>

        <div class="side-panel">
            <div class="array-box">
                <div class="array-title" id="work-title">推演資源 (Work)</div>
                <div class="array-vals" id="work-val">3, 3, 2</div>
            </div>
            
            <div class="array-box finish-box">
                <div class="array-title finish-title" id="finish-title">完工狀態 (Finish)</div>
                <div class="array-vals" style="font-size:22px;">
                    P0:<span id="f0" class="val-false">F</span> 
                    P1:<span id="f1" class="val-false">F</span><br>
                    P2:<span id="f2" class="val-false">F</span> 
                    P3:<span id="f3" class="val-false">F</span>
                </div>
            </div>
        </div>
    </div>

    <div class="desc-box" id="desc-text">
        點擊「下一步」開始。系統建立虛擬陣列 Work = Available (3,3,2)，並且將所有行程的 Finish 設為 False。
    </div>
</div>

<script>
    let lang = 'zh';
    let step = 0;

    const dict = {
        zh: {
            title: "安全演算法 (Safety Algorithm) 沙盤推演", next: "下一步 (Next)", reset: "重置 (Reset)",
            thProc: "行程 (Process)", thAlloc: "已分配 (Allocation)", thNeed: "尚需 (Need)",
            workTitle: "推演資源 (Work)", finishTitle: "完工狀態 (Finish)",
            
            s0: "點擊「下一步」開始。系統建立虛擬陣列 <span class='highlight-warn'>Work = Available (3,3,2)</span>，並且將所有行程的 Finish 設為 <span class='highlight'>False (F)</span>。",
            s1: "<b>掃描 P0：</b><br>條件 1: Finish[0] == False (通過)<br>條件 2: Need(7,4,3) ≤ Work(3,3,2)? <span class='highlight'>不符合</span>。P0 跳過。",
            s2: "<b>掃描 P1：</b><br>條件 1: Finish[1] == False (通過)<br>條件 2: Need(1,2,2) ≤ Work(3,3,2)? <span class='highlight-green'>符合！</span> P1 可以順利完工。",
            s3: "<b>模擬 P1 完工：</b><br>P1 完工後會歸還資源。更新 Work = Work + Allocation(2,0,0) = <span class='highlight-green'>(5,3,2)</span>。<br>將 Finish[1] 標記為 <span class='highlight-green'>True (T)</span>。",
            s4: "<b>掃描 P2：</b><br>條件 1: Finish[2] == False (通過)<br>條件 2: Need(6,0,0) ≤ Work(5,3,2)? <span class='highlight'>不符合</span>。P2 跳過。",
            s5: "<b>掃描 P3：</b><br>條件 1: Finish[3] == False (通過)<br>條件 2: Need(0,1,1) ≤ Work(5,3,2)? <span class='highlight-green'>符合！</span> P3 可以順利完工。",
            s6: "<b>模擬 P3 完工：</b><br>更新 Work = Work + Allocation(2,1,1) = <span class='highlight-green'>(7,4,3)</span>。<br>將 Finish[3] 標記為 <span class='highlight-green'>True (T)</span>。",
            s7: "<b>第二輪掃描，回到 P0：</b><br>條件 1: Finish[0] == False (通過)<br>條件 2: Need(7,4,3) ≤ Work(7,4,3)? <span class='highlight-green'>符合！</span> 隨著 Work 變大，P0 現在可以完工了。",
            s8: "<b>模擬 P0 完工：</b><br>更新 Work = Work + Allocation(0,1,0) = <span class='highlight-green'>(7,5,3)</span>。<br>將 Finish[0] 標記為 <span class='highlight-green'>True (T)</span>。",
            s9: "<b>第二輪掃描，檢查 P2：</b><br>條件 1: Finish[2] == False (通過)<br>條件 2: Need(6,0,0) ≤ Work(7,5,3)? <span class='highlight-green'>符合！</span> P2 可以順利完工。",
            s10: "<b>模擬 P2 完工：</b><br>更新 Work = Work + Allocation(3,0,2) = <span class='highlight-green'>(10,5,5)</span>。<br>將 Finish[2] 標記為 <span class='highlight-green'>True (T)</span>。",
            s11: "<b>推演結束：</b><br>檢查發現所有 Finish[i] 皆為 <span class='highlight-green'>True</span>！<br>找到安全順序 <P1, P3, P0, P2>。系統處於<span class='highlight-green'>安全狀態 (SAFE STATE)</span>！"
        },
        en: {
            title: "Safety Algorithm Simulation", next: "Next Step", reset: "Reset",
            thProc: "Process", thAlloc: "Allocation", thNeed: "Need",
            workTitle: "Simulated Available (Work)", finishTitle: "Completion (Finish)",
            
            s0: "Click 'Next' to start. Initialize <span class='highlight-warn'>Work = Available (3,3,2)</span> and Finish[i] = <span class='highlight'>False (F)</span> for all i.",
            s1: "<b>Check P0:</b><br>Cond 1: Finish[0] == False (Pass)<br>Cond 2: Need(7,4,3) ≤ Work(3,3,2)? <span class='highlight'>Fail</span>. Skip P0.",
            s2: "<b>Check P1:</b><br>Cond 1: Finish[1] == False (Pass)<br>Cond 2: Need(1,2,2) ≤ Work(3,3,2)? <span class='highlight-green'>Pass!</span> P1 can finish.",
            s3: "<b>Simulate P1 Completion:</b><br>P1 returns its resources. Work = Work + Allocation(2,0,0) = <span class='highlight-green'>(5,3,2)</span>.<br>Set Finish[1] = <span class='highlight-green'>True (T)</span>.",
            s4: "<b>Check P2:</b><br>Cond 1: Finish[2] == False (Pass)<br>Cond 2: Need(6,0,0) ≤ Work(5,3,2)? <span class='highlight'>Fail</span>. Skip P2.",
            s5: "<b>Check P3:</b><br>Cond 1: Finish[3] == False (Pass)<br>Cond 2: Need(0,1,1) ≤ Work(5,3,2)? <span class='highlight-green'>Pass!</span> P3 can finish.",
            s6: "<b>Simulate P3 Completion:</b><br>Work = Work + Allocation(2,1,1) = <span class='highlight-green'>(7,4,3)</span>.<br>Set Finish[3] = <span class='highlight-green'>True (T)</span>.",
            s7: "<b>Pass 2, Check P0 again:</b><br>Cond 1: Finish[0] == False (Pass)<br>Cond 2: Need(7,4,3) ≤ Work(7,4,3)? <span class='highlight-green'>Pass!</span> Work has grown enough for P0.",
            s8: "<b>Simulate P0 Completion:</b><br>Work = Work + Allocation(0,1,0) = <span class='highlight-green'>(7,5,3)</span>.<br>Set Finish[0] = <span class='highlight-green'>True (T)</span>.",
            s9: "<b>Pass 2, Check P2 again:</b><br>Cond 1: Finish[2] == False (Pass)<br>Cond 2: Need(6,0,0) ≤ Work(7,5,3)? <span class='highlight-green'>Pass!</span> P2 can finish.",
            s10: "<b>Simulate P2 Completion:</b><br>Work = Work + Allocation(3,0,2) = <span class='highlight-green'>(10,5,5)</span>.<br>Set Finish[2] = <span class='highlight-green'>True (T)</span>.",
            s11: "<b>Simulation Complete:</b><br>All Finish[i] == <span class='highlight-green'>True</span>!<br>Safe Sequence found: <P1, P3, P0, P2>. System is in a <span class='highlight-green'>SAFE STATE</span>!"
        }
    };

    function updateUI() {
        document.getElementById('title').innerText = dict[lang].title;
        document.getElementById('btn-next').innerText = dict[lang].next;
        document.getElementById('btn-reset').innerText = dict[lang].reset;
        document.getElementById('th-proc').innerText = dict[lang].thProc;
        document.getElementById('th-alloc').innerText = dict[lang].thAlloc;
        document.getElementById('th-need').innerText = dict[lang].thNeed;
        document.getElementById('work-title').innerText = dict[lang].workTitle;
        document.getElementById('finish-title').innerText = dict[lang].finishTitle;
        
        document.getElementById('desc-text').innerHTML = dict[lang]['s' + step];
    }

    function toggleLang() {
        lang = lang === 'zh' ? 'en' : 'zh';
        updateUI();
    }

    function clearRows() {
        for(let i=0; i<=3; i++) {
            let row = document.getElementById('r-p'+i);
            row.classList.remove('row-active', 'row-fail');
        }
    }
    
    function setRow(pid, state) {
        clearRows();
        let row = document.getElementById('r-p'+pid);
        row.classList.add('row-' + state);
    }

    function updateWork(valStr) {
        let el = document.getElementById('work-val');
        el.innerText = valStr;
        el.classList.remove('val-update');
        void el.offsetWidth; // trigger reflow
        el.classList.add('val-update');
    }

    function setFinish(pid) {
        let el = document.getElementById('f'+pid);
        el.innerText = 'T';
        el.className = 'val-true val-update';
    }

    function reset() {
        step = 0;
        clearRows();
        for(let i=0; i<=3; i++) {
            document.getElementById('r-p'+i).classList.remove('row-success');
            let f = document.getElementById('f'+i);
            f.innerText = 'F';
            f.className = 'val-false';
        }
        updateWork("3, 3, 2");
        document.getElementById('work-val').classList.remove('val-update');
        updateUI();
    }

    function nextStep() {
        if(step === 0) { step = 1; setRow(0, 'fail'); }
        else if(step === 1) { step = 2; setRow(1, 'active'); }
        else if(step === 2) { step = 3; setRow(1, 'success'); updateWork("5, 3, 2"); setFinish(1); }
        else if(step === 3) { step = 4; setRow(2, 'fail'); }
        else if(step === 4) { step = 5; setRow(3, 'active'); }
        else if(step === 5) { step = 6; setRow(3, 'success'); updateWork("7, 4, 3"); setFinish(3); }
        else if(step === 6) { step = 7; setRow(0, 'active'); }
        else if(step === 7) { step = 8; setRow(0, 'success'); updateWork("7, 5, 3"); setFinish(0); }
        else if(step === 8) { step = 9; setRow(2, 'active'); }
        else if(step === 9) { step = 10; setRow(2, 'success'); updateWork("10, 5, 5"); setFinish(2); }
        else if(step === 10) { step = 11; clearRows(); }
        else { reset(); return; }
        
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
