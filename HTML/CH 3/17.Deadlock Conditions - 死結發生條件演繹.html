<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Conditions - 死結發生條件演繹</title>
    <style>
        :root {
            --primary: #003366;
            --accent: #f1c40f;
            --hold: #27ae60;
            --wait: #e74c3c;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', 'PingFang TC', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            text-align: center;
        }
        .header {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-lang { background: var(--primary); color: white; }
        .btn-next { background: var(--wait); color: white; }
        .btn-reset { background: #95a5a6; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .stage {
            height: 400px;
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
            position: relative;
            background: #fafafa;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .node {
            width: 100px;
            height: 100px;
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            transition: all 0.5s;
        }
        .process { background: var(--primary); }
        .resource { background: #7f8c8d; }
        
        #p1 { left: 80px; top: 150px; }
        #p2 { right: 80px; top: 150px; }
        #ra { left: 50%; top: 40px; transform: translateX(-50%); }
        #rb { left: 50%; bottom: 40px; transform: translateX(-50%); }

        .line {
            position: absolute;
            height: 4px;
            z-index: 1;
            transform-origin: left center;
            transition: all 0.5s;
            opacity: 0;
        }
        .line-hold { background: var(--hold); }
        .line-wait { background: var(--wait); }

        .desc-box {
            background: #eef2f7;
            padding: 20px;
            border-radius: 8px;
            min-height: 100px;
            text-align: left;
            border-left: 6px solid var(--primary);
            line-height: 1.6;
        }
        .deadlock-alert {
            color: var(--wait);
            font-weight: bold;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes shake { 0%, 100% { transform: translate(-50%, -50%); } 25% { transform: translate(-55%, -50%); } 75% { transform: translate(-45%, -50%); } }
        .shake-active { animation: shake 0.2s infinite; border: 4px solid var(--wait) !important; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1 id="title">死結 (Deadlock) 發生條件演繹</h1>
        <div class="controls">
            <button class="btn-lang" onclick="toggleLang()">English / 中文</button>
            <button class="btn-next" onclick="nextStep()" id="next-btn">下一步 (Next)</button>
            <button class="btn-reset" onclick="reset()">重置系統</button>
        </div>
    </div>

    <div class="stage" id="stage">
        <div class="node process" id="p1">P1</div>
        <div class="node process" id="p2">P2</div>
        <div class="node resource" id="ra">Res A</div>
        <div class="node resource" id="rb">Res B</div>
        
        <!-- Lines -->
        <div id="l-ra-p1" class="line line-hold"></div>
        <div id="l-rb-p2" class="line line-hold"></div>
        <div id="l-p1-rb" class="line line-wait"></div>
        <div id="l-p2-ra" class="line line-wait"></div>
    </div>

    <div class="desc-box" id="desc">
        點擊「下一步」開始。初始狀態：資源 A 與 B 皆空閒。
    </div>
</div>

<script>
    let lang = 'zh';
    let step = 0;

    const content = {
        zh: {
            title: "死結 (Deadlock) 發生條件演繹",
            next: "下一步 (Next)",
            reset: "重置系統",
            s0: "初始狀態：行程 P1 與 P2 準備運行，資源 A 與 B 皆空閒。",
            s1: "<b>步驟 1 (互斥 & 佔有)：</b>行程 P1 請求並成功獲取資源 A。此時 P1 持有 A，資源 A 已被鎖定。",
            s2: "<b>步驟 2：</b>行程 P2 請求並成功獲取資源 B。此時 P2 持有 B。",
            s3: "<b>步驟 3 (佔有並等待)：</b>行程 P1 在持有 A 的情況下，請求資源 B。但 B 被 P2 佔有，P1 進入等待狀態。",
            s4: "<b>步驟 4 (不可搶奪 & 循環等待)：</b>行程 P2 請求資源 A。但 A 被 P1 佔有。此時 P1 等 B，B 等 P2，P2 等 A，A 等 P1，形成環狀。<br><span class='deadlock-alert'>[死結發生！]</span> 四個必要條件同時滿足。"
        },
        en: {
            title: "Deadlock Conditions Visualization",
            next: "Next Step",
            reset: "Reset System",
            s0: "Initial State: P1 and P2 are ready. Resources A and B are free.",
            s1: "<b>Step 1 (Hold):</b> Process P1 acquires Resource A. P1 now holds A, which is mutually exclusive.",
            s2: "<b>Step 2:</b> Process P2 acquires Resource B. P2 now holds B.",
            s3: "<b>Step 3 (Hold and Wait):</b> While holding A, P1 requests B. Since P2 holds B, P1 enters a waiting state.",
            s4: "<b>Step 4 (Circular Wait):</b> P2 requests A. Now P1 waits for B (held by P2), and P2 waits for A (held by P1).<br><span class='deadlock-alert'>[DEADLOCK DETECTED!]</span> All 4 conditions met."
        }
    };

    function updateText() {
        document.getElementById('title').innerText = content[lang].title;
        document.getElementById('next-btn').innerText = content[lang].next;
        document.getElementById('desc').innerHTML = content[lang]['s' + step];
    }

    function toggleLang() {
        lang = lang === 'zh' ? 'en' : 'zh';
        updateText();
    }

    function setLine(id, x1, y1, x2, y2, visible) {
        const line = document.getElementById(id);
        if (!visible) { line.style.opacity = 0; return; }
        const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
        line.style.width = length + 'px';
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.transform = `rotate(${angle}deg)`;
        line.style.opacity = 1;
    }

    function nextStep() {
        if (step === 0) {
            step = 1;
            setLine('l-ra-p1', 450, 90, 180, 200, true);
        } else if (step === 1) {
            step = 2;
            setLine('l-rb-p2', 450, 310, 720, 200, true);
        } else if (step === 2) {
            step = 3;
            setLine('l-p1-rb', 180, 200, 450, 310, true);
        } else if (step === 3) {
            step = 4;
            setLine('l-p2-ra', 720, 200, 450, 90, true);
            document.getElementById('p1').classList.add('shake-active');
            document.getElementById('p2').classList.add('shake-active');
        } else {
            reset();
            return;
        }
        updateText();
    }

    function reset() {
        step = 0;
        const lines = document.querySelectorAll('.line');
        lines.forEach(l => l.style.opacity = 0);
        document.getElementById('p1').classList.remove('shake-active');
        document.getElementById('p2').classList.remove('shake-active');
        updateText();
    }

    updateText();
</script>

</body>
</html>
