<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>OS Process Scheduling Demo</title>
    <style>
        :root {
            --ready-clr: #2ecc71;
            --cpu-clr: #e74c3c;
            --done-clr: #95a5a6;
            --dark: #2c3e50;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 900px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        button { padding: 12px 24px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-step { background: var(--dark); color: white; }
        .btn-lang { background: #fff; border: 2px solid var(--dark); color: var(--dark); }
        button:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        /* 排程區域 */
        .stage { position: relative; height: 300px; background: #fff; border: 2px solid #eee; border-radius: 15px; margin: 20px 0; display: flex; justify-content: space-around; align-items: center; }

        .zone { border: 2px dashed #ccc; border-radius: 10px; padding: 20px; text-align: center; position: relative; min-width: 150px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .zone-label { position: absolute; top: -12px; background: white; padding: 0 10px; font-size: 0.8rem; font-weight: bold; color: #999; }

        .process-ball {
            width: 50px; height: 50px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center;
            font-weight: bold; position: absolute; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--ready-clr); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 說明框 */
        .info-box { background: #fff; padding: 20px; border-radius: 12px; border-left: 6px solid var(--dark); min-height: 100px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-size: 1.1rem; line-height: 1.6; width: 100%; box-sizing: border-box; }

        .en { display: none; }
        .active-en .en { display: block; }
        .active-en .zh { display: none; }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div class="controls">
            <button class="btn-step" onclick="nextStep()">STEP BY STEP / 下一步</button>
            <button class="btn-lang" onclick="toggleLang()">EN / 中文 切換</button>
        </div>

        <div class="stage">
            <div class="zone">
                <div class="zone-label">Ready Queue (就緒佇列)</div>
            </div>
            <div class="zone" style="border-color: var(--cpu-clr); color: var(--cpu-clr);">
                <div class="zone-label" style="color: var(--cpu-clr);">CPU</div>
            </div>
            
            <div id="p1" class="process-ball">P1</div>
        </div>

        <div class="info-box" id="info">
            <div class="zh">初始狀態：行程 P1 進入就緒佇列，等待分配 CPU。</div>
            <div class="en">Initial: Process P1 enters the Ready Queue, waiting for CPU.</div>
        </div>
    </div>

    <script>
        let step = 0;
        const p1 = document.getElementById('p1');
        const info = document.getElementById('info');

        const scenario = [
            { 
                pos: {left: 'calc(25% - 25px)', top: '125px', bg: 'var(--ready-clr)'}, 
                zh: "1. 佇列排隊：P1 在就緒佇列的首位。", 
                en: "1. Queuing: P1 is at the head of the Ready Queue." 
            },
            { 
                pos: {left: 'calc(75% - 25px)', top: '125px', bg: 'var(--cpu-clr)'}, 
                zh: "2. 分配 CPU：排程器將 P1 送入 CPU 執行一個時間片。", 
                en: "2. Dispatch: Scheduler moves P1 to CPU for a time quantum." 
            },
            { 
                pos: {left: 'calc(25% - 25px)', top: '220px', bg: 'var(--ready-clr)'}, 
                zh: "3. 時間用完：P1 尚未執行完畢，被迫離開 CPU 並回到佇列末端。", 
                en: "3. Time Out: P1 is not finished, forced to leave CPU and rejoin the queue tail." 
            },
            { 
                pos: {left: 'calc(75% - 25px)', top: '125px', bg: 'var(--cpu-clr)'}, 
                zh: "4. 再次獲取：輪到 P1，再次進入 CPU 完成剩下的工作。", 
                en: "4. Regain CPU: It's P1's turn again, moves to CPU to finish its task." 
            },
            { 
                pos: {left: '90%', top: '125px', bg: 'var(--done-clr)'}, 
                zh: "5. 結束：P1 執行完畢，離開系統。", 
                en: "5. Exit: P1 completes its execution and leaves the system." 
            },
            { 
                pos: {left: '10%', top: '125px', bg: 'var(--ready-clr)'}, 
                zh: "重置演譯。", en: "Resetting demo." 
            }
        ];

        function nextStep() {
            const current = scenario[step];
            p1.style.left = current.pos.left;
            p1.style.top = current.pos.top;
            p1.style.backgroundColor = current.pos.bg;

            info.innerHTML = `<div class="zh">${current.zh}</div><div class="en">${current.en}</div>`;
            step = (step + 1) % scenario.length;
        }

        function toggleLang() { document.body.classList.toggle('active-en'); }
    </script>
</body>
</html>
