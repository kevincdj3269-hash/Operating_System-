<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FCFS Scheduling Step-by-Step</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --p1: #e74c3c;
            --p2: #f1c40f;
            --p3: #2ecc71;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 850px; width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-step { background: var(--accent); color: white; }
        .btn-lang { background: var(--primary); color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* 甘特圖容器 */
        .gantt-chart { display: flex; height: 60px; background: #eee; border-radius: 8px; overflow: hidden; margin: 20px 0; border: 2px solid #ddd; }
        .block { display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; width: 0; opacity: 0; transition: all 0.8s ease; overflow: hidden; }
        .block.show { opacity: 1; }
        
        .b1 { background: var(--p1); }
        .b2 { background: var(--p2); }
        .b3 { background: var(--p3); }

        .time-scale { display: flex; justify-content: space-between; font-weight: bold; font-family: monospace; height: 20px; }

        /* 內容顯示 */
        .zh { display: block; }
        .en { display: none; }
        .active-en .zh { display: none; }
        .active-en .en { display: block; }

        .info-box { background: #fff9db; padding: 15px; border-radius: 8px; border-left: 5px solid #f1c40f; margin-top: 20px; min-height: 80px; }
    </style>
</head>
<body>

    <div class="container" id="main">
        <div class="controls">
            <button class="btn-step" onclick="nextStep()">NEXT STEP / 下一步</button>
            <button class="btn-lang" onclick="toggleLang()">EN / 中文</button>
        </div>

        <div class="zh">
            <h1>FCFS 先到先做排程演譯</h1>
            <p>範例：P1(8ms), P2(3ms), P3(3ms) 皆在 0ms 到達。</p>
        </div>
        <div class="en">
            <h1>FCFS Scheduling Demonstration</h1>
            <p>Example: P1(8ms), P2(3ms), P3(3ms) all arrive at 0ms.</p>
        </div>

        <div class="gantt-chart">
            <div id="pb1" class="block b1" style="flex-basis: 57%">P1 (8ms)</div>
            <div id="pb2" class="block b2" style="flex-basis: 21.5%">P2 (3ms)</div>
            <div id="pb3" class="block b3" style="flex-basis: 21.5%">P3 (3ms)</div>
        </div>
        <div class="time-scale">
            <span>0</span><span id="t1" style="visibility:hidden">8</span><span id="t2" style="visibility:hidden">11</span><span id="t3" style="visibility:hidden">14</span>
        </div>

        <div class="info-box" id="info-text">
            <span class="zh">點擊「下一步」開始演譯...</span>
            <span class="en">Click "NEXT STEP" to start...</span>
        </div>
    </div>

    <script>
        let step = 0;
        const infoZH = [
            "步驟 1：P1 先到達，執行 8ms。此時 P2, P3 在後面排隊（護航效應開始）。",
            "步驟 2：P1 完成。P2 開始執行 3ms。雖然 P2 很短，但它已經等了 8ms。",
            "步驟 3：P3 最後執行 3ms。總完成時間為 14ms。",
            "演譯結束。平均等待時間 = (0 + 8 + 11) / 3 = 6.33ms。"
        ];
        const infoEN = [
            "Step 1: P1 arrives first, runs for 8ms. P2 & P3 are waiting (Convoy Effect starts).",
            "Step 2: P1 finished. P2 runs for 3ms. Even though P2 is short, it waited 8ms.",
            "Step 3: P3 runs for the final 3ms. Total completion time is 14ms.",
            "End. Avg Waiting Time = (0 + 8 + 11) / 3 = 6.33ms."
        ];

        function nextStep() {
            step++;
            if(step > 4) {
                step = 0;
                document.querySelectorAll('.block').forEach(b => b.classList.remove('show'));
                document.querySelectorAll('.time-scale span').forEach((s, i) => { if(i>0) s.style.visibility = 'hidden'; });
            }

            if(step >= 1) { document.getElementById('pb1').classList.add('show'); document.getElementById('t1').style.visibility = 'visible'; }
            if(step >= 2) { document.getElementById('pb2').classList.add('show'); document.getElementById('t2').style.visibility = 'visible'; }
            if(step >= 3) { document.getElementById('pb3').classList.add('show'); document.getElementById('t3').style.visibility = 'visible'; }

            const zhSpan = document.querySelector('#info-text .zh');
            const enSpan = document.querySelector('#info-text .en');
            zhSpan.innerText = infoZH[step-1] || "點擊「下一步」重置。";
            enSpan.innerText = infoEN[step-1] || "Click NEXT to reset.";
        }

        function toggleLang() {
            document.body.classList.toggle('active-en');
        }
    </script>
</body>
</html>
