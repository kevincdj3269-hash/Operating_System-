<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context Switch Interactive Demo</title>
    <style>
        :root {
            --p1-clr: #3498db;
            --p2-clr: #e67e22;
            --cpu-clr: #2c3e50;
            --data-clr: #f1c40f;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 900px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        button { padding: 12px 24px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-step { background: var(--cpu-clr); color: white; }
        .btn-lang { background: #fff; border: 2px solid var(--cpu-clr); color: var(--cpu-clr); }
        button:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        /* 演譯區域 */
        .stage { position: relative; height: 350px; background: #fff; border: 2px solid #eee; border-radius: 15px; margin: 20px 0; overflow: hidden; display: flex; justify-content: space-around; align-items: center; }

        .pcb { width: 140px; height: 180px; border: 3px solid #ccc; border-radius: 10px; display: flex; flex-direction: column; align-items: center; padding: 10px; position: relative; }
        .pcb-label { font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        #pcb1 { border-color: var(--p1-clr); color: var(--p1-clr); }
        #pcb2 { border-color: var(--p2-clr); color: var(--p2-clr); }

        .cpu { width: 120px; height: 120px; background: var(--cpu-clr); color: white; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; }

        /* 狀態資料塊 */
        .context-data {
            width: 80px; height: 30px; background: var(--data-clr); border-radius: 5px; 
            position: absolute; display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: #333; font-weight: bold;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0; z-index: 10;
        }

        /* 說明框 */
        .info-box { background: #eef2f7; padding: 20px; border-radius: 12px; border-left: 6px solid var(--cpu-clr); min-height: 100px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-size: 1.1rem; line-height: 1.6; }
        
        .en { display: none; }
        .active-en .en { display: block; }
        .active-en .zh { display: none; }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div class="controls">
            <button class="btn-step" onclick="nextStep()">STEP BY STEP / 下一步</button>
            <button class="btn-lang" onclick="toggleLang()">EN / 中文 切換</button>
        </div>

        <div class="stage">
            <div id="pcb1" class="pcb"><span class="pcb-label">PCB (Process A)</span></div>
            <div class="cpu" id="cpu-node">CPU<br><small id="running-task">IDLE</small></div>
            <div id="pcb2" class="pcb"><span class="pcb-label">PCB (Process B)</span></div>

            <div id="data-block" class="context-data">CONTEXT</div>
        </div>

        <div class="info-box" id="info">
            <div class="zh">初始狀態：CPU 正在執行行程 A。</div>
            <div class="en">Initial: CPU is executing Process A.</div>
        </div>
    </div>

    <script>
        let step = 0;
        const data = document.getElementById('data-block');
        const cpuText = document.getElementById('running-task');
        const info = document.getElementById('info');

        const scenario = [
            { pos: {left: '410px', top: '160px', op: 1}, task: 'Proc A', zh: '1. 發生中斷或系統呼叫：作業系統暫停行程 A 的執行。', en: '1. Interrupt/System Call: OS suspends Process A.' },
            { pos: {left: '100px', top: '160px', op: 1}, task: 'OS SAVING', zh: '2. 儲存狀態：將 CPU 暫存器、程式計數器等資訊存入 PCB_A。', en: '2. Save State: Store registers and PC into PCB_A.' },
            { pos: {left: '660px', top: '160px', op: 1}, task: 'OS LOADING', zh: '3. 載入狀態：從 PCB_B 讀取先前存下的行程 B 執行環境。', en: '3. Load State: Retrieve Process B\'s environment from PCB_B.' },
            { pos: {left: '410px', top: '160px', op: 1}, task: 'Proc B', zh: '4. 恢復執行：將資料填入 CPU，行程 B 開始（或繼續）執行。', en: '4. Resume: Restore data to CPU; Process B starts/resumes.' },
            { pos: {left: '410px', top: '160px', op: 0}, task: 'IDLE', zh: '重置演譯。', en: 'Resetting demo.' }
        ];

        function nextStep() {
            const current = scenario[step];
            data.style.left = current.pos.left;
            data.style.top = current.pos.top;
            data.style.opacity = current.pos.op;
            cpuText.innerText = current.task;
            
            info.innerHTML = `
                <div class="zh">${current.zh}</div>
                <div class="en">${current.en}</div>
            `;
            
            step = (step + 1) % scenario.length;
        }

        function toggleLang() {
            document.body.classList.toggle('active-en');
        }
    </script>
</body>
</html>
