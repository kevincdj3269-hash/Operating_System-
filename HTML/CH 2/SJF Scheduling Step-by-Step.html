<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SJF Scheduling Step-by-Step</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #8e44ad;
            --p1: #3498db;
            --p2: #e67e22;
            --p3: #27ae60;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 850px; width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-step { background: var(--accent); color: white; }
        .btn-lang { background: var(--primary); color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* 甘特圖容器 */
        .gantt-chart { display: flex; height: 60px; background: #eee; border-radius: 8px; overflow: hidden; margin: 20px 0; border: 2px solid #ddd; }
        .block { display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; width: 0; opacity: 0; transition: all 0.8s ease; overflow: hidden; white-space: nowrap; }
        .block.show { opacity: 1; }
        
        .b1 { background: var(--p1); } /* P1 (6ms) */
        .b2 { background: var(--p2); } /* P2 (8ms) */
        .b3 { background: var(--p3); } /* P3 (2ms) */

        .time-scale { display: flex; justify-content: space-between; font-weight: bold; font-family: monospace; height: 20px; }

        /* 內容顯示控制 */
        .zh { display: block; }
        .en { display: none; }
        .active-en .zh { display: none; }
        .active-en .en { display: block; }

        .info-box { background: #eef2f7; padding: 15px; border-radius: 8px; border-left: 5px solid var(--accent); margin-top: 20px; min-height: 80px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container" id="main">
        <div class="controls">
            <button class="btn-step" onclick="nextStep()">NEXT STEP / 下一步</button>
            <button class="btn-lang" onclick="toggleLang()">EN / 中文</button>
        </div>

        <div class="zh">
            <h1>SJF 最短工作優先演譯</h1>
            <p>假設 P1(6ms), P2(8ms), P3(2ms) 同時在 0ms 到達。</p>
        </div>
        <div class="en">
            <h1>SJF Scheduling Visualization</h1>
            <p>Example: P1(6ms), P2(8ms), P3(2ms) all arrive at 0ms.</p>
        </div>

        <div class="gantt-chart">
            <div id="pb3" class="block b3" style="flex-basis: 12.5%">P3 (2ms)</div>
            <div id="pb1" class="block b1" style="flex-basis: 37.5%">P1 (6ms)</div>
            <div id="pb2" class="block b2" style="flex-basis: 50%">P2 (8ms)</div>
        </div>
        <div class="time-scale">
            <span>0</span><span id="t1" style="visibility:hidden">2</span><span id="t2" style="visibility:hidden">8</span><span id="t3" style="visibility:hidden">16</span>
        </div>

        <div class="info-box" id="info-text">
            <span class="zh">點擊「下一步」開始演譯 SJF 的選擇邏輯...</span>
            <span class="en">Click "NEXT STEP" to see how SJF picks the shortest job...</span>
        </div>
    </div>

    <script>
        let step = 0;
        const infoZH = [
            "步驟 1：SJF 檢查所有任務，發現 P3 (2ms) 最短，優先執行。",
            "步驟 2：P3 完成。剩下 P1(6ms) 與 P2(8ms)，P1 較短，接著執行 P1。",
            "步驟 3：最後執行最長的 P2 (8ms)。總完成時間為 16ms。",
            "演譯結束。平均等待時間 = (0[P3] + 2[P1] + 8[P2]) / 3 = 3.33ms。相較於 FCFS 會顯著降低。"
        ];
        const infoEN = [
            "Step 1: SJF scans tasks and finds P3 (2ms) is the shortest. P3 starts.",
            "Step 2: P3 finished. Between P1(6ms) and P2(8ms), P1 is shorter and starts next.",
            "Step 3: Finally, the longest job P2 (8ms) is executed. Total time: 16ms.",
            "End. Avg Waiting Time = (0 + 2 + 8) / 3 = 3.33ms. This is optimal for these jobs."
        ];

        function nextStep() {
            step++;
            if(step > 4) {
                step = 0;
                document.querySelectorAll('.block').forEach(b => b.classList.remove('show'));
                document.querySelectorAll('.time-scale span').forEach((s, i) => { if(i>0) s.style.visibility = 'hidden'; });
            }

            if(step >= 1) { document.getElementById('pb3').classList.add('show'); document.getElementById('t1').style.visibility = 'visible'; }
            if(step >= 2) { document.getElementById('pb1').classList.add('show'); document.getElementById('t2').style.visibility = 'visible'; }
            if(step >= 3) { document.getElementById('pb2').classList.add('show'); document.getElementById('t3').style.visibility = 'visible'; }

            const zhSpan = document.querySelector('#info-text .zh');
            const enSpan = document.querySelector('#info-text .en');
            zhSpan.innerText = infoZH[step-1] || "點擊「下一步」重置演譯。";
            enSpan.innerText = infoEN[step-1] || "Click NEXT to reset demonstration.";
        }

        function toggleLang() {
            document.body.classList.toggle('active-en');
        }
    </script>
</body>
</html>
